<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabi Tango — Japanese Travel Flashcards</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <!-- Theme applied before paint to prevent flash -->
  <script src="js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/flashcard.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo">
      <span class="logo-primary">Tabi Tango</span>
      <span class="logo-sub">旅単語 · Journey Words</span>
    </div>
    <div class="nav-center">
      <a href="index.html" class="nav-link active">
        Study
        <span class="due-badge" id="due-count">0</span>
      </a>
      <a href="quiz.html" class="nav-link">Quiz</a>
      <a href="progress.html" class="nav-link">Progress</a>
    </div>
    <div class="nav-right">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:none">
          <circle cx="10" cy="10" r="3.5"/>
          <line x1="10" y1="2" x2="10" y2="3.5"/>
          <line x1="10" y1="16.5" x2="10" y2="18"/>
          <line x1="2" y1="10" x2="3.5" y2="10"/>
          <line x1="16.5" y1="10" x2="18" y2="10"/>
          <line x1="4.1" y1="4.1" x2="5.2" y2="5.2"/>
          <line x1="14.8" y1="14.8" x2="15.9" y2="15.9"/>
          <line x1="15.9" y1="4.1" x2="14.8" y2="5.2"/>
          <line x1="5.2" y1="14.8" x2="4.1" y2="15.9"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M15.5 10.5a6 6 0 1 1-6-6 4.5 4.5 0 0 0 6 6z"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<main>
  <div class="container">

    <div class="mastery-bar-wrap">
      <div class="mastery-bar-labels">
        <span>Mastery</span>
        <span id="mastery-text">0 / 65 phrases</span>
      </div>
      <div class="mastery-bar-track">
        <div class="mastery-bar-fill" id="mastery-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="category-tabs" id="category-tabs">
      <button class="cat-tab active" data-cat="all">All <span id="all-count"></span></button>
      <button class="cat-tab" data-cat="greetings">Greetings</button>
      <button class="cat-tab" data-cat="food">Food</button>
      <button class="cat-tab" data-cat="shopping">Shopping</button>
      <button class="cat-tab" data-cat="directions">Directions</button>
      <button class="cat-tab" data-cat="emergency">Emergency</button>
    </div>

    <div id="flashcard-root"></div>

    <div class="keyboard-hint">
      <span class="key-item"><kbd>Space</kbd> flip</span>
      <span class="key-item"><kbd>→</kbd> next</span>
      <span class="key-item"><kbd>←</kbd> prev</span>
      <span class="key-item"><kbd>1</kbd> remembered</span>
      <span class="key-item"><kbd>2</kbd> forgot</span>
    </div>

  </div>
</main>

<footer>
  <span id="trip-countdown">Loading…</span>
</footer>

<script src="js/data.js"></script>
<script src="js/srs.js"></script>
<script src="js/flashcard.js"></script>
</body>
</html>
